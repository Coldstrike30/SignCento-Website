kind = "web"
previewPath = "/"
title = "Signcentro Website"
version = "1.0.0"
id = "artifacts/signcentro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23619

[services.development]
run = "pnpm --filter @workspace/signcentro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/signcentro", "run", "build" ]
publicDir = "artifacts/signcentro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23619"
BASE_PATH = "/"
